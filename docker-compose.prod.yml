name: megafeed

# Compose de produção. Variáveis de ambiente vêm do arquivo .env na mesma pasta.
#
# Domínio público: https://app.solixpost.com.br (frontend) / https://api.solixpost.com.br (API)
#
# Conexões internas (app → banco, redis, minio) usam os nomes dos containers:
#   DATABASE_URL   = postgresql://USER:PASS@megafeed-postgres:5432/DB?schema=public
#   REDIS_HOST     = megafeed-redis
#   MINIO_ENDPOINT = megafeed-minio
#
# Apenas a porta da aplicação (PORT) é exposta para o host/proxy reverso.

services:
  # ─── Aplicação ──────────────────────────────────────────────────────────────
  megafeed-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: megafeed-app
    container_name: megafeed-app
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    env_file:
      - .env
    depends_on:
      megafeed-postgres:
        condition: service_healthy
      megafeed-redis:
        condition: service_healthy
      megafeed-minio:
        condition: service_started
    networks:
      - megafeed-network

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  megafeed-postgres:
    image: postgres:16-alpine
    container_name: megafeed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-megafeed}
    volumes:
      - megafeed-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-megafeed}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - megafeed-network

  # ─── Redis ───────────────────────────────────────────────────────────────────
  megafeed-redis:
    image: redis:7-alpine
    container_name: megafeed-redis
    restart: unless-stopped
    volumes:
      - megafeed-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - megafeed-network

  # ─── MinIO ───────────────────────────────────────────────────────────────────
  megafeed-minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: megafeed-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - megafeed-minio-data:/data
    # Console de administração (opcional — remova se não precisar de acesso externo)
    ports:
      - "9001:9001"
    networks:
      - megafeed-network

networks:
  megafeed-network:
    driver: bridge

volumes:
  megafeed-postgres-data:
  megafeed-redis-data:
  megafeed-minio-data:
