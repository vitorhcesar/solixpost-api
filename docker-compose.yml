name: megafeed

services:
  megafeed-postgres:
    image: postgres:16-alpine
    container_name: megafeed-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: megafeed
    volumes:
      - megafeed-postgres-data:/var/lib/postgresql/data

  megafeed-redis:
    image: redis:7-alpine
    container_name: megafeed-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - megafeed-redis-data:/data

  megafeed-minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: megafeed-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - megafeed-minio-data:/data

volumes:
  megafeed-postgres-data:
  megafeed-redis-data:
  megafeed-minio-data:
