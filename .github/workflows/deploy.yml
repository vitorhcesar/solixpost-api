name: Deploy to VPS

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# Garante que apenas um deploy rode por vez
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  VPS_PORT: ${{ secrets.VPS_PORT || '22' }}

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: PROD_ENV

    steps:
      # ──────────────────────────────────────────────────────────────────────
      # 1. Checkout do código
      # ──────────────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────────────────────────────
      # 2. Gerar arquivo .env a partir dos secrets
      # ──────────────────────────────────────────────────────────────────────
      # Domínio de produção: app.solixpost.com.br (frontend) / api.solixpost.com.br (API)
      #
      # Secrets de URL (GitHub PROD_ENV):
      #   CORS_ORIGIN             = https://app.solixpost.com.br
      #   BETTER_AUTH_URL         = https://api.solixpost.com.br
      #   PUBLIC_API_URL          = https://api.solixpost.com.br
      #   INSTAGRAM_REDIRECT_URI  = https://api.solixpost.com.br/api/v1/instagram/connect/callback
      #   SMTP_FROM               = noreply@solixpost.com.br
      #
      # Conexões internas Docker (hostnames dos containers):
      #   DATABASE_URL   = postgresql://USER:PASS@megafeed-postgres:5432/DB?schema=public
      #   REDIS_HOST     = megafeed-redis
      #   MINIO_ENDPOINT = megafeed-minio
      - name: Create .env file
        run: |
          cat > .env << 'ENVEOF'
          PORT=${{ secrets.PORT }}
          NODE_ENV=production
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
          INSTAGRAM_APP_ID=${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}
          INSTAGRAM_REDIRECT_URI=${{ secrets.INSTAGRAM_REDIRECT_URI }}
          INSTAGRAM_OAUTH_SCOPES=${{ secrets.INSTAGRAM_OAUTH_SCOPES }}
          PUBLIC_API_URL=${{ secrets.PUBLIC_API_URL }}
          MINIO_ENDPOINT=${{ secrets.MINIO_ENDPOINT }}
          MINIO_PORT=${{ secrets.MINIO_PORT }}
          MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET=${{ secrets.MINIO_BUCKET }}
          MINIO_USE_SSL=${{ secrets.MINIO_USE_SSL }}
          REDIS_HOST=${{ secrets.REDIS_HOST }}
          REDIS_PORT=${{ secrets.REDIS_PORT }}
          OMEGAPAY_PUBLIC_KEY=${{ secrets.OMEGAPAY_PUBLIC_KEY }}
          OMEGAPAY_SECRET_KEY=${{ secrets.OMEGAPAY_SECRET_KEY }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          SMTP_SECURE=${{ secrets.SMTP_SECURE }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          ENVEOF

      # ──────────────────────────────────────────────────────────────────────
      # 3. Carregar a chave SSH via ssh-agent (garante formatação correta)
      # ──────────────────────────────────────────────────────────────────────
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # ──────────────────────────────────────────────────────────────────────
      # 4. Registrar a chave do host da VPS no known_hosts
      #    Falha explícita se não conseguir nenhuma chave (host inacessível)
      # ──────────────────────────────────────────────────────────────────────
      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          KEYS=$(ssh-keyscan -p "${{ env.VPS_PORT }}" -T 15 -t rsa,ecdsa,ed25519 "${{ secrets.VPS_HOST }}" 2>/dev/null)
          if [ -z "$KEYS" ]; then
            echo "::error::ssh-keyscan não retornou nenhuma chave. Verifique VPS_HOST (${{ secrets.VPS_HOST }}) e VPS_PORT (${{ env.VPS_PORT }})."
            exit 1
          fi
          echo "$KEYS" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          echo "Host keys registrados com sucesso."

      # ──────────────────────────────────────────────────────────────────────
      # 5. Criar diretório de deploy na VPS (idempotente)
      # ──────────────────────────────────────────────────────────────────────
      - name: Ensure deploy directory exists
        run: |
          ssh -p "${{ env.VPS_PORT }}" \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p ${{ secrets.VPS_DEPLOY_PATH }}"

      # ──────────────────────────────────────────────────────────────────────
      # 6. Sincronizar código-fonte para a VPS via rsync
      #    Exclui: node_modules, .git, .env, generated (recriado pelo Docker)
      # ──────────────────────────────────────────────────────────────────────
      - name: Sync source files to VPS
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='generated/' \
            --exclude='.cursor/' \
            -e "ssh -p ${{ env.VPS_PORT }} -o StrictHostKeyChecking=yes -o BatchMode=yes" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_PATH }}/"

      # ──────────────────────────────────────────────────────────────────────
      # 7. Copiar .env gerado para a VPS
      # ──────────────────────────────────────────────────────────────────────
      - name: Copy .env to VPS
        run: |
          scp -P "${{ env.VPS_PORT }}" \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            .env "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_PATH }}/.env"

      # ──────────────────────────────────────────────────────────────────────
      # 8. Build e deploy com Docker Compose
      # ──────────────────────────────────────────────────────────────────────
      - name: Deploy with Docker Compose
        run: |
          ssh -p "${{ env.VPS_PORT }}" \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd ${{ secrets.VPS_DEPLOY_PATH }} && \
             docker compose -f docker-compose.prod.yml pull --ignore-buildable && \
             docker compose -f docker-compose.prod.yml up -d --build --remove-orphans && \
             docker image prune -f"

      # ──────────────────────────────────────────────────────────────────────
      # 9. Verificar saúde da aplicação
      # ──────────────────────────────────────────────────────────────────────
      - name: Health check
        run: |
          echo "Aguardando aplicação inicializar..."
          sleep 15
          ssh -p "${{ env.VPS_PORT }}" \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "docker inspect --format='{{.State.Health.Status}}' megafeed-app"
